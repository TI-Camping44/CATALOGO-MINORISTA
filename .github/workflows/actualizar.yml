name: Actualizar Catálogo Odoo

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

# PERMISOS OBLIGATORIOS PARA PUBLICAR DIRECTO
permissions:
  contents: write
  pages: write
  id-token: write

# EL CAZAFANTASMAS: Obliga a matar cualquier proceso viejo trabado en el servidor
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Ejecutar Script de Odoo
        run: python generar_catalogo.py

      - name: Guardar código
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add index.html
          git commit -m "Catálogo actualizado" || echo "Sin cambios"
          git push origin main

      - name: Configurar servidor de Pages
        uses: actions/configure-pages@v5

      - name: Empaquetar la web
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Forzar Publicación
        id: deployment
        uses: actions/deploy-pages@v4
