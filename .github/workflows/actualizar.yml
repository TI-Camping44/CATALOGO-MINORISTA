name: Actualizar Catálogo Odoo

on:
  schedule:
    - cron: '*/30 * * * *' # Se ejecuta de forma automática cada 30 minutos
  workflow_dispatch: # Activa el botón manual

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Ejecutar Script de Odoo
        run: python generar_catalogo.py

      - name: Guardar y subir index.html al repositorio
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Actualización automática de precios desde Odoo"
          git push origin main
