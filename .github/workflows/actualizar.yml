name: Actualizar Catálogo Odoo

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Ejecutar Script de Odoo
        run: python generar_catalogo.py

      - name: Crear ruta limpia y subir (Bypass de error)
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add index.html
          git commit -m "Catalogo actualizado" || echo "Nada que actualizar"
          git branch -M web-publica
          git push -f origin web-publica
